<!doctype html>
<html lang="en">
  <head>
    <!-- INCANTO — contact.html -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact · Incanto</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>
  <body class="bg-gradient-page">
    <div id="site-loader" class="loader">
      <div class="loader__inner">
        <div class="loader__mark"></div>
        <div class="loader__title">Incanto</div>
      </div>
    </div>
    <header class="site-header" data-site-header>
      <div class="site-header__bar container">
        <a class="logo" href="index.html"
          ><span class="logo__glyph" aria-hidden="true">✦</span>Incanto</a
        >
        <nav class="nav-desktop" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="#incanto-wizard" data-wizard-open data-no-transition
            >Gift wizard</a
          >
          <a href="categories.html">Categories</a>
          <a href="about.html">About</a>
          <a href="contact.html" aria-current="page">Contact</a>
        </nav>
        <div class="header-actions">
          <button
            type="button"
            class="theme-toggle"
            data-theme-toggle
            aria-label="Toggle theme"
          >
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.8 1.42-1.42zm10.48 0l1.79-1.79 1.41 1.41-1.79 1.8-1.41-1.42zM12 4V1h-1v3h1zm0 19v-3h-1v3h1zm8-9h3v-1h-3v1zM1 12v1h3v-1H1zm18.36-6.36l1.41-1.41-1.79-1.8-1.42 1.42 1.8 1.79zM4.22 19.78l1.8 1.79 1.41-1.41-1.79-1.8-1.42 1.42zM12 6.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11z"
              />
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
              />
            </svg>
          </button>
          <button
            type="button"
            class="nav-toggle"
            data-nav-toggle
            aria-expanded="false"
            aria-controls="mobile-drawer"
          >
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
      <nav
        id="mobile-drawer"
        class="mobile-drawer"
        data-mobile-drawer
        aria-label="Mobile"
      >
        <a href="index.html">Home</a>
        <a href="#incanto-wizard" data-wizard-open data-no-transition
          >Gift wizard</a
        >
        <a href="categories.html">Categories</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="saved.html">Saved gifts</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main
      id="main"
      class="section container"
      style="padding-top: var(--space-16)"
    >
      <div
        class="reveal"
        style="max-width: 560px; margin-bottom: var(--space-8)"
      >
        <p class="section__eyebrow">Contact</p>
        <h1 class="page-hero__title">Let’s talk partnerships</h1>
        <p class="page-hero__lead">
          Retail integrations, white-label, or press — send a note (demo form).
        </p>
      </div>

      <form id="contact-form" class="form-card reveal" style="max-width: 640px">
        <div class="grid-2" style="gap: var(--space-4)">
          <div class="field">
            <input
              id="c-name"
              name="name"
              autocomplete="name"
              placeholder=" "
              required
            />
            <label for="c-name">Name</label>
          </div>
          <div class="field">
            <input
              id="c-email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder=" "
              required
            />
            <label for="c-email">Email</label>
          </div>
        </div>
        <div class="field">
          <select id="c-topic" name="topic">
            <option value="" selected></option>
            <option value="press">Press</option>
            <option value="partner">Partnership</option>
            <option value="support">Support</option>
          </select>
          <label for="c-topic">Topic</label>
        </div>
        <div class="field field--textarea">
          <textarea
            id="c-msg"
            name="message"
            placeholder=" "
            rows="5"
            required
          ></textarea>
          <label for="c-msg">Message</label>
        </div>
        <button class="btn btn--primary btn--block btn--lg" type="submit">
          Send message
        </button>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container footer-bottom" style="margin: 0; border: 0">
        <span>© <span id="year"></span> Incanto</span>
        <a class="text-muted" href="index.html">Home</a>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="js/data/products.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/ui-toast.js"></script>
    <script src="js/page-transitions.js"></script>
    <script src="js/contact-form.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
