<!doctype html>
<html lang="en">
  <head>
    <!-- INCANTO — product.html: product detail (hydrated via ?id=) -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product · Incanto</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>
  <body class="bg-gradient-page">
    <div id="site-loader" class="loader">
      <div class="loader__inner">
        <div class="loader__mark"></div>
        <div class="loader__title">Incanto</div>
      </div>
    </div>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" data-site-header>
      <div class="site-header__bar container">
        <a class="logo" href="index.html"
          ><span class="logo__glyph" aria-hidden="true">✦</span>Incanto</a
        >
        <nav class="nav-desktop" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="#incanto-wizard" data-wizard-open data-no-transition
            >Gift wizard</a
          >
          <a href="categories.html">Categories</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="header-actions">
          <button
            type="button"
            class="theme-toggle"
            data-theme-toggle
            aria-label="Toggle theme"
          >
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.8 1.42-1.42zm10.48 0l1.79-1.79 1.41 1.41-1.79 1.8-1.41-1.42zM12 4V1h-1v3h1zm0 19v-3h-1v3h1zm8-9h3v-1h-3v1zM1 12v1h3v-1H1zm18.36-6.36l1.41-1.41-1.79-1.8-1.42 1.42 1.8 1.79zM4.22 19.78l1.8 1.79 1.41-1.41-1.79-1.8-1.42 1.42zM12 6.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11z"
              />
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
              />
            </svg>
          </button>
          <a class="btn btn--secondary" href="categories.html"
            >Back to browse</a
          >
          <button
            type="button"
            class="nav-toggle"
            data-nav-toggle
            aria-expanded="false"
            aria-controls="mobile-drawer"
          >
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
      <nav
        id="mobile-drawer"
        class="mobile-drawer"
        data-mobile-drawer
        aria-label="Mobile"
      >
        <a href="index.html">Home</a>
        <a href="#incanto-wizard" data-wizard-open data-no-transition
          >Gift wizard</a
        >
        <a href="categories.html">Categories</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="saved.html">Saved gifts</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main id="main" class="section container">
      <div
        class="grid-2 reveal"
        style="align-items: start; gap: var(--space-10)"
      >
        <div
          class="glass-panel"
          style="padding: var(--space-4); border-radius: var(--radius-xl)"
        >
          <img
            id="product-image"
            src=""
            alt=""
            style="
              width: 100%;
              border-radius: var(--radius-lg);
              aspect-ratio: 4/3;
              object-fit: cover;
            "
          />
        </div>
        <div>
          <p
            id="product-category"
            class="section__eyebrow"
            style="margin-bottom: var(--space-2)"
          >
            Category
          </p>
          <h1
            id="product-title"
            class="font-display"
            style="
              font-size: var(--text-5xl);
              font-weight: 800;
              letter-spacing: var(--tracking-tight);
            "
          >
            Loading…
          </h1>
          <p
            id="product-price"
            style="
              font-size: var(--text-3xl);
              font-weight: 800;
              margin: var(--space-4) 0;
              color: var(--color-primary);
            "
          ></p>
          <p
            id="product-description"
            class="text-muted"
            style="
              line-height: var(--leading-relaxed);
              margin-bottom: var(--space-6);
            "
          ></p>
          <div
            id="product-tags"
            class="chips"
            style="margin-bottom: var(--space-8)"
          ></div>
          <div style="display: flex; flex-wrap: wrap; gap: var(--space-3)">
            <button
              type="button"
              id="product-wishlist"
              class="btn btn--secondary"
              data-wishlist-toggle
              data-product-id=""
              aria-pressed="false"
            >
              ♥ Save to wishlist
            </button>
            <button
              type="button"
              id="product-save"
              class="btn btn--primary"
              data-sound-click
            >
              Save gift idea
            </button>
            <a class="btn btn--ghost" href="discover.html">Find similar</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-bottom" style="margin: 0; border: 0">
        <span>© <span id="year"></span> Incanto</span>
        <a class="text-muted" href="index.html">Home</a>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="js/data/products.js"></script>
    <script src="js/price.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/ui-toast.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/saved-gifts.js"></script>
    <script src="js/page-transitions.js"></script>
    <script src="js/product-page.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
