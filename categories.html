<!doctype html>
<html lang="en">
  <head>
    <!-- INCANTO — categories.html: browse by category with chip filters -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Categories · Incanto</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>
  <body class="bg-gradient-page">
    <div id="site-loader" class="loader">
      <div class="loader__inner">
        <div class="loader__mark"></div>
        <div class="loader__title">Incanto</div>
      </div>
    </div>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" data-site-header>
      <div class="site-header__bar container">
        <a class="logo" href="index.html"
          ><span class="logo__glyph" aria-hidden="true">✦</span>Incanto</a
        >
        <nav class="nav-desktop" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="#incanto-wizard" data-wizard-open data-no-transition
            >Gift wizard</a
          >
          <a href="categories.html" aria-current="page">Categories</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="header-actions">
          <button
            type="button"
            class="theme-toggle"
            data-theme-toggle
            aria-label="Toggle theme"
          >
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.8 1.42-1.42zm10.48 0l1.79-1.79 1.41 1.41-1.79 1.8-1.41-1.42zM12 4V1h-1v3h1zm0 19v-3h-1v3h1zm8-9h3v-1h-3v1zM1 12v1h3v-1H1zm18.36-6.36l1.41-1.41-1.79-1.8-1.42 1.42 1.8 1.79zM4.22 19.78l1.8 1.79 1.41-1.41-1.79-1.8-1.42 1.42zM12 6.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11z"
              />
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
              />
            </svg>
          </button>
          <a class="btn btn--primary" href="discover.html">Discover</a>
          <button
            type="button"
            class="nav-toggle"
            data-nav-toggle
            aria-expanded="false"
            aria-controls="mobile-drawer"
          >
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
      <nav
        id="mobile-drawer"
        class="mobile-drawer"
        data-mobile-drawer
        aria-label="Mobile"
      >
        <a href="index.html">Home</a>
        <a href="#incanto-wizard" data-wizard-open data-no-transition
          >Gift wizard</a
        >
        <a href="categories.html">Categories</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="saved.html">Saved gifts</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main id="main" class="section container">
      <section class="page-hero">
        <p class="section__eyebrow">Browse</p>
        <h1 class="page-hero__title">Categories</h1>
        <p class="page-hero__lead">
          Filter the catalog by department — data is local for this static demo.
        </p>
      </section>

      <div class="chips reveal" style="margin-bottom: var(--space-8)">
        <button type="button" class="chip is-active" data-category-chip="All">
          All
        </button>
        <button type="button" class="chip" data-category-chip="Tech">
          Tech
        </button>
        <button type="button" class="chip" data-category-chip="Gaming">
          Gaming
        </button>
        <button type="button" class="chip" data-category-chip="Beauty">
          Beauty
        </button>
        <button type="button" class="chip" data-category-chip="Fashion">
          Fashion
        </button>
        <button type="button" class="chip" data-category-chip="Books">
          Books
        </button>
        <button type="button" class="chip" data-category-chip="Home">
          Home
        </button>
        <button type="button" class="chip" data-category-chip="Flowers">
          Flowers
        </button>
        <button type="button" class="chip" data-category-chip="Travel">
          Travel
        </button>
        <button type="button" class="chip" data-category-chip="Wellness">
          Wellness
        </button>
        <button type="button" class="chip" data-category-chip="Accessories">
          Accessories
        </button>
      </div>

      <div id="categories-grid" class="grid-3"></div>
    </main>

    <footer class="site-footer">
      <div class="container footer-bottom" style="margin: 0; border: 0">
        <span>© <span id="year"></span> Incanto</span>
        <a class="text-muted" href="index.html">Home</a>
      </div>
    </footer>

    <div id="product-modal" class="modal-backdrop" hidden>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <div class="modal__head">
          <h2
            id="modal-title"
            class="font-display"
            style="font-size: var(--text-xl)"
            data-modal-title
          >
            Product
          </h2>
          <button
            type="button"
            class="modal__close"
            data-modal-close
            aria-label="Close"
          >
            ×
          </button>
        </div>
        <div class="modal__body">
          <div>
            <img
              data-modal-image
              src=""
              alt=""
              style="width: 100%; border-radius: var(--radius-lg)"
            />
          </div>
          <div>
            <p
              style="
                font-size: var(--text-3xl);
                font-weight: 800;
                margin: var(--space-2) 0;
              "
              data-modal-price
            ></p>
            <p
              data-modal-desc
              class="text-muted"
              style="line-height: var(--leading-relaxed)"
            ></p>
            <div
              style="
                display: flex;
                gap: var(--space-3);
                margin-top: var(--space-6);
                flex-wrap: wrap;
              "
            >
              <a class="btn btn--primary" data-modal-link href="#"
                >View details</a
              >
              <button type="button" class="btn btn--secondary" data-modal-close>
                Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="js/data/products.js"></script>
    <script src="js/price.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/ui-toast.js"></script>
    <script src="js/ui-modal.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/page-transitions.js"></script>
    <script src="js/categories-render.js"></script>
    <script src="js/categories-page.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
