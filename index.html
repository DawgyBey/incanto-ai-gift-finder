<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incanto - AI Gift Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Floating Background Elements -->
    <div class="floating-container" id="floating-bg"></div>

    <header class="header fade-in">
      <div class="logo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 2L14.5 9.5H22L16 14L18.5 21.5L12 17L5.5 21.5L8 14L2 9.5H9.5L12 2Z"
            fill="#D94B3E"
          />
        </svg>
        <span>INCANTO</span>
      </div>
      <div class="nav-right">AI Gift Finder</div>
    </header>

    <main class="container">
      <section class="hero slide-up">
        <h1>Find the <span class="gradient-text">Perfect Gift</span></h1>
        <p>
          Tell us about the person and occasion — our AI concierge will find
          something they'll truly love.
        </p>
      </section>

      <form class="gift-card slide-up-delayed">
        <div class="card-header">
          <div class="gift-icon-container">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="white"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M20 12V20H4V12H20ZM22 10H2V22H22V10ZM7 2C7.53043 2 8.03914 2.21071 8.41421 2.58579C8.78929 2.96086 9 3.46957 9 4C9 4.31 8.86 4.59 8.64 4.79L12 8.15L15.36 4.79C15.14 4.59 15 4.31 15 4C15 3.46957 15.2107 2.96086 15.5858 2.58579C15.9609 2.21071 16.4696 2 17 2C18.1 2 19 2.9 19 4C19 5.1 18.1 6 17 6H15.83L12 9.83L8.17 6H7C5.9 6 5 5.1 5 4C5 2.9 5.9 2 7 2Z"
              />
            </svg>
          </div>
          <h2>Tell us about the gift</h2>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Occasion</label>
            <div class="select-wrapper">
              <select>
                <option value="" disabled selected>Select occasion</option>
                <option>Birthday</option>
                <option>Anniversary</option>
                <option>Wedding</option>
                <option>Holiday</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Recipient</label>
            <div class="select-wrapper">
              <select>
                <option value="" disabled selected>Who is it for?</option>
                <option>Partner</option>
                <option>Parent</option>
                <option>Friend</option>
                <option>Colleague</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Budget (Rs)</label>
            <input type="number" value="50" placeholder="e.g. 50" />
          </div>
          <div class="form-group">
            <label>Interests</label>
            <input type="text" placeholder="e.g. music, cooking, tech" />
          </div>
          <div class="form-group full-width">
            <label>Personality</label>
            <input
              type="text"
              placeholder="e.g. adventurous, introvert, creative, practical"
            />
          </div>
        </div>

        <button type="submit" class="submit-btn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          Find the Perfect Gift
        </button>
      </form>
    </main>

    <script src="script.js"></script>
  </body>
</html>
